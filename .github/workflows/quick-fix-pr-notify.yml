name: Quick fix PR – Slack notification

on:
  pull_request:
    types: [labeled]

jobs:
  notify:
    name: Notify Slack
    if: |
      (github.event.action == 'labeled' && (github.event.label.name == 'ai-quick-fix' || github.event.label.name == 'ai-deep-fix'))
    uses: OutSystems/tk-cicd/.github/workflows/quick-fix-pr-slack-notify.yml@main
    with:
      repository: ${{ github.repository }}
      pr_number: ${{ github.event.pull_request.number }}
      pr_url: ${{ github.event.pull_request.html_url }}
      pr_title: ${{ github.event.pull_request.title }}
      pr_description: ${{ github.event.pull_request.body || '' }}
      pr_label: ${{ github.event.label.name }}
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_TK_BOT_TOKEN }}
