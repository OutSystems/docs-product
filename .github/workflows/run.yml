name: Run

on:
  workflow_dispatch:
  push:
    branches:
    - master
    - main
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled, ready_for_review, converted_to_draft]

concurrency:
  group: run-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-info:
    name: Pull Request / Info
    runs-on: ubuntu-latest
    steps:
    - name: Find Pull Request
      if: github.ref_name != github.event.repository.default_branch
      id: PR
      uses: 8BitJonny/gh-get-current-pr@4.0.0
      with:
        filterOutClosed: true
        sha: ${{ github.event.pull_request.head.sha }}

    - name: Merge Queue PR
      id: merge-queue
      if: github.event_name == 'merge_group'
      uses: release-kit/regex@v1
      with:
        pattern: 'gh-readonly-queue\/.+\/pr-(?<pr>[0-9]+)-.*'
        string: ${{ github.ref_name }}
    
    - name: 'Pull Request'
      if: steps.PR.outputs.number != '' || steps.merge-queue.outputs.pr != ''
      run: |
        echo "::notice title=Pull Request ${{ '#' }}${{ steps.PR.outputs.number || steps.merge-queue.outputs.pr }}::This workflow execution is related to the Pull Request https://github.com/${{ github.repository }}/pull/${{ steps.PR.outputs.number || steps.merge-queue.outputs.pr }}" 

    - name: Changed files
      id: changed-files
      if: (github.ref_name != github.event.repository.default_branch && steps.PR.outputs.number != '') || github.event_name == 'merge_group'
      uses: MiguelDomingues/pull-request-changed-files@v1.0.3
      with:
        repository: ${{ github.repository }}
        pull-request: ${{ steps.PR.outputs.number || steps.merge-queue.outputs.pr }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Check auto-merge
      uses: reitermarkus/automerge@v2
      if: vars.ENABLE_AUTO_MERGE && steps.PR.outputs.number != ''
      with:
        pull-request: ${{ steps.PR.outputs.number }}
        token: ${{ secrets.TOOLS_PAT }}
        do-not-merge-labels: never-merge,do not merge
        required-labels: auto-merge

    outputs:
      changed-files: ${{ steps.changed-files.outputs.files }}
      pull-request: ${{ steps.PR.outputs.number }}
      pull-request-title: ${{ steps.PR.outputs.pr_title }}
      skip-jira: ${{ github.ref_name != github.event.repository.default_branch && contains(steps.PR.outputs.pr_labels, 'skip-jira') }}
      publish-dev: ${{ github.ref_name != github.event.repository.default_branch && contains(steps.PR.outputs.pr_labels, 'publish-dev') }}

  jira:
    name: "JIRA"
    needs: [pr-info]
    if: needs.pr-info.outputs.pull-request != ''
    uses: ./.github/workflows/jira-issue-pr.yml
    secrets: inherit
    with:
      pull-request: ${{ needs.pr-info.outputs.pull-request }}

  visual-assets:
    name: "Visual Assets"
    needs: [pr-info]
    if: needs.pr-info.outputs.pull-request != ''
    uses: ./.github/workflows/visual-assets-pr.yml
    secrets: inherit
    with:
      pull-request: ${{ needs.pr-info.outputs.pull-request }}
      files: ${{ needs.pr-info.outputs.changed-files }}
  
  style-guide-validation:
    name: Run style guide validation
    needs: [pr-info]
    if: needs.pr-info.outputs.changed-files != ''
    uses: ./.github/workflows/style-guide-validation.yml
    secrets: inherit
    with:
      changed-files: ${{ needs.pr-info.outputs.changed-files }}
      pull-request: ${{ needs.pr-info.outputs.pull-request }}

  style-guide-fixes:
    name: Style Guide Fixes
    needs: [pr-info, style-guide-validation]
    if: always() && github.ref_name != github.event.repository.default_branch && needs.pr-info.outputs.changed-files != '' && github.event_name != 'merge_group' && needs.pr-info.result == 'success' && needs.style-guide-validation.result != 'cancelled'
    uses: ./.github/workflows/style-guide-fixes.yml
    with:
      changed-files: ${{ needs.pr-info.outputs.changed-files }}
      pull-request: ${{ needs.pr-info.outputs.pull-request }}
    secrets: inherit

  validate-toc:
    name: Validate files in TOC
    needs: [pr-info]
    if: needs.pr-info.outputs.changed-files != ''
    uses: ./.github/workflows/validate-toc.yml
    with:
      changed-files: ${{ needs.pr-info.outputs.changed-files }}
    secrets: inherit

  auto-publish-documentation:
    name: Auto-publish documentation
    needs: [pr-info]
    if: github.event_name == 'pull_request' && needs.pr-info.outputs.changed-files != '' && github.event.pull_request.base.ref == github.event.repository.default_branch
    uses: OutSystems/tk-cicd/.github/workflows/auto-publish-documentation.yml@main
    with:
      changed-files: ${{ needs.pr-info.outputs.changed-files }}
      pr-number: ${{ needs.pr-info.outputs.pull-request }}
      base-sha: ${{ github.event.pull_request.base.sha }}
      enable_auto_publish_new_files: ${{ vars.ENABLE_AUTO_PUBLISH_NEW_FILES != '' && vars.ENABLE_AUTO_PUBLISH_NEW_FILES || 'true' }}
      enable_auto_publish_updated_files: ${{ vars.ENABLE_AUTO_PUBLISH_UPDATED_FILES != '' && vars.ENABLE_AUTO_PUBLISH_UPDATED_FILES || 'true' }}
    secrets:
      github-token: ${{ secrets.TOOLS_PAT }}

  auto-fill:
    if: github.event_name == 'pull_request'
    uses: OutSystems/tk-cicd/.github/workflows/autofill-frontmatter.yml@main
    needs: [pr-info]
    with:
      GITHUB_REPOSITORY: ${{ github.repository }}
      PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
      ACTION_TYPE: ${{ github.event.action }}  # Pass the action type (opened or synchronize)
      BEFORE_SHA: ${{ github.event.before }}   # Pass the SHA of the commit before the synchronization
      AFTER_SHA: ${{ github.event.after }}
      BASE_BRANCH: ${{ github.event.pull_request.base.ref }}  # Base branch of the pull request
      HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}  # Head branch of the pull request 
    secrets: inherit

  frontmatter:
    name: Frontmatter
    uses: ./.github/workflows/validate-frontmatter.yml
    needs: [pr-info, auto-fill]
    secrets: inherit

  validations:
    name: Misc validations
    needs: [pr-info]
    uses: ./.github/workflows/validations.yml
    secrets: inherit
    with:
      GITHUB_REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ needs.pr-info.outputs.pull-request }}
      TK_CICD_BRANCH: 'main'

  metadata-updates:
    name: Metadata
    needs: [pr-info]
    uses: OutSystems/tk-cicd/.github/workflows/metadata-updates.yml@main
    with:
      changed-files: ${{ needs.pr-info.outputs.changed-files }}
      pull-request: ${{ needs.pr-info.outputs.pull-request }}
      runner-type: ubuntu
      front-matter-key-filter: guid
      file-glob-filter: "*.md"
    secrets: inherit
    
  tools:
    name: Tools
    needs: [pr-info, frontmatter, metadata-updates, validate-toc]
    uses: ./.github/workflows/build.yml
    secrets: inherit

  publish-dev:
    name: Publish Dev
    uses: OutSystems/tk-cicd/.github/workflows/auto-publish.yml@main
    needs: [pr-info, tools, validations]
    if: needs.pr-info.outputs.publish-dev == 'true'
    with:
      target-branch: ${{ vars.DEV_BRANCH }}
      pr-number: ${{ needs.pr-info.outputs.pull-request }}
      changed-files: ${{ needs.pr-info.outputs.changed-files }}
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
